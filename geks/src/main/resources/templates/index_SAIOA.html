<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Miguel Altuna - Gailuak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">


    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">Miguel Altuna Inbentarioa</a>
        </div>
    </nav>


    <div class="container">
        <div class="p-5 mb-4 bg-white rounded-3 shadow-sm">
            <div class="container-fluid py-5 text-center">
                <h1 class="display-5 fw-bold" th:text="${mezua}">Hemen mezua agertuko da</h1>
                <p class="col-md-8 fs-4 mx-auto text-muted">
                    Gailu elektronikoak, gelak eta eraikinak kudeatzeko zure web aplikazio berria.
                </p>
                <button class="btn btn-primary btn-lg" type="button">Hasi saioa</button>
            </div>
        </div>
    </div>


    <div class="container mt-5">
    <h3 class="mb-3">Erabiltzaileen Zerrenda</h3>
    <div class="table-responsive bg-white p-3 rounded shadow-sm">
        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Izena</th>
                    <th>Abizena</th>
                    <th>Erabiltzaile Izena</th>
                    <th>Alta Data</th>
                    <th>Baja Data</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="erab : ${erabiltzailea}">
                    <td th:text="${erab.id_erabiltzailea}"></td>
                    <td th:text="${erab.izena}"></td>
                    <td th:text="${erab.abizena}"></td>
                    <td th:text="${erab.erabiltzaile_izena}"></td>
                    <td th:text="${erab.alta_data}"></td>
                    <td th:text="${erab.baja_data}">kajdslifeljl</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<br>
<br><br>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
